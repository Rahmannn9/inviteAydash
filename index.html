<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe4f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated blur background elements */
        .blur-blob {
            position: fixed;
            border-radius: 50%;
            opacity: 0;
            filter: blur(80px);
            pointer-events: none;
            animation: blobFloat 8s infinite ease-in-out;
        }

        .blur-blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(214,51,132,0.4), transparent);
            left: -200px;
            top: 100px;
            animation-delay: 0s;
        }

        .blur-blob-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(194,24,91,0.3), transparent);
            right: -150px;
            top: 400px;
            animation-delay: 2s;
        }

        .blur-blob-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(214,51,132,0.35), transparent);
            left: 50%;
            bottom: 100px;
            animation-delay: 4s;
        }

        @keyframes blobFloat {
            0%, 100% {
                opacity: 0.3;
                transform: translate(0, 0) scale(1);
                filter: blur(80px);
            }
            25% {
                opacity: 0.5;
                transform: translate(50px, -50px) scale(1.1);
                filter: blur(60px);
            }
            50% {
                opacity: 0.3;
                transform: translate(-30px, 30px) scale(0.9);
                filter: blur(100px);
            }
            75% {
                opacity: 0.4;
                transform: translate(30px, 50px) scale(1.05);
                filter: blur(70px);
            }
        }

        /* Floating particles with fade */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0) scale(0.5);
                filter: blur(5px);
            }
            20% {
                opacity: 1;
                filter: blur(0px);
            }
            80% {
                opacity: 1;
                filter: blur(0px);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) translateX(50px) scale(1);
                filter: blur(10px);
            }
        }

        .heart {
            animation: particleFloat 6s infinite ease-in;
        }

        .flower {
            animation: particleFloat 7s infinite ease-in;
        }

        .container {
            max-width: 100%;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            animation: fadeInBlur 1.2s ease-out;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #c2185b;
            font-size: 1.2rem;
            font-style: italic;
            animation: fadeInBlur 1.2s ease-out 0.2s both;
            margin-bottom: 30px;
        }

        @keyframes fadeInBlur {
            from {
                opacity: 0;
                filter: blur(10px);
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                filter: blur(0px);
                transform: translateY(0);
            }
        }

        .selection-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 8px 30px rgba(214, 51, 132, 0.15);
            animation: slideInBlur 1s ease-out both;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .selection-container:hover {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            box-shadow: 0 12px 40px rgba(214, 51, 132, 0.2);
        }

        .selection-container:nth-of-type(2) {
            animation-delay: 0.4s;
        }

        .selection-container:nth-of-type(3) {
            animation-delay: 0.8s;
        }

        @keyframes slideInBlur {
            from {
                opacity: 0;
                filter: blur(10px);
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                filter: blur(0px);
                transform: translateY(0);
            }
        }

        .selection-title {
            color: #d63384;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: bold;
            animation: textGlow 3s infinite ease-in-out;
        }

        @keyframes textGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(214, 51, 132, 0.3);
                opacity: 0.8;
            }
            50% {
                text-shadow: 0 0 20px rgba(214, 51, 132, 0.6);
                opacity: 1;
            }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: rgba(240, 240, 240, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(214, 51, 132, 0.2);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: bold;
            color: #333;
            animation: buttonAppear 0.8s ease-out backwards;
        }

        .option-btn:nth-child(1) { animation-delay: 0s; }
        .option-btn:nth-child(2) { animation-delay: 0.1s; }
        .option-btn:nth-child(3) { animation-delay: 0.2s; }
        .option-btn:nth-child(4) { animation-delay: 0.3s; }

        @keyframes buttonAppear {
            from {
                opacity: 0;
                filter: blur(10px);
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                filter: blur(0px);
                transform: scale(1);
            }
        }

        .option-btn:hover {
            background: rgba(232, 213, 232, 0.8);
            backdrop-filter: blur(10px);
            border-color: #d63384;
            transform: scale(1.08);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, rgba(214, 51, 132, 0.9), rgba(194, 24, 91, 0.9));
            backdrop-filter: blur(15px);
            color: white;
            border-color: #d63384;
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.5);
            animation: selectPulse 0.6s ease-out;
        }

        @keyframes selectPulse {
            0% {
                transform: scale(0.9);
                opacity: 0;
                filter: blur(5px);
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1.1);
                opacity: 1;
                filter: blur(0px);
            }
        }

        .submit-btn {
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.3);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 20px;
            animation: fadeInBlur 1.2s ease-out 1.2s both;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 12px 35px rgba(214, 51, 132, 0.6);
            filter: brightness(1.1);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: blur(2px);
        }

        .footer {
            margin-top: 40px;
            font-size: 1.5rem;
            animation: fadeInBlur 1.2s ease-out 1.6s both;
            background: linear-gradient(90deg, transparent, rgba(214, 51, 132, 0.1), transparent);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .options-grid { grid-template-columns: 1fr; }
            .selection-container { padding: 20px; max-width: 90%; }
            .blur-blob { filter: blur(60px); }
        }

        /* Confetti with blur effect */
        .confetti {
            position: fixed;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
            font-size: 1.5rem;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
                filter: blur(0px);
            }
            50% {
                opacity: 1;
                filter: blur(2px);
            }
            100% {
                opacity: 0;
                transform: translateY(300px) rotate(720deg) scale(0);
                filter: blur(5px);
            }
        }
    </style>
</head>
<body>
    <!-- Animated blur blobs -->
    <div class="blur-blob blur-blob-1"></div>
    <div class="blur-blob blur-blob-2"></div>
    <div class="blur-blob blur-blob-3"></div>

    <div class="container">
        <h1>✨ You're Special ✨</h1>
        <p class="subtitle">Let's plan our café date! Choose the café and time.</p>

        <div class="selection-container">
            <div class="selection-title">☕ Choose a Café</div>
            <div class="options-grid" id="cafeGrid"></div>
        </div>

        <div class="selection-container">
            <div class="selection-title">⏰ Choose a Time</div>
            <div class="options-grid" id="timeGrid"></div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="sendWhatsApp()" disabled>
            Send My Choice 💕
        </button>

        <div class="footer">Can't wait to see you! 💕✨🌹</div>
    </div>

    <script>
        const cafes = [
            { name: 'Café Aroma', emoji: '☕' },
            { name: 'Café Bliss', emoji: '🌸' },
            { name: 'Café Lumière', emoji: '🌹' },
            { name: 'Café Harmony', emoji: '🦋' }
        ];

        const times = [
            '2:00 PM',
            '3:00 PM',
            '4:30 PM',
            '5:15 PM'
        ];

        let selectedCafe = null;
        let selectedTime = null;

        function createCafeButtons() {
            const grid = document.getElementById('cafeGrid');
            cafes.forEach((cafe, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `${cafe.emoji} ${cafe.name}`;
                btn.onclick = () => selectCafe(index, btn);
                grid.appendChild(btn);
            });
        }

        function createTimeButtons() {
            const grid = document.getElementById('timeGrid');
            times.forEach((time, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `${time}`;
                btn.onclick = () => selectTime(index, btn);
                grid.appendChild(btn);
            });
        }

        function selectCafe(index, btn) {
            document.querySelectorAll('#cafeGrid .option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedCafe = cafes[index].name;
            enableSubmitBtn();
        }

        function selectTime(index, btn) {
            document.querySelectorAll('#timeGrid .option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedTime = times[index];
            enableSubmitBtn();
        }

        function enableSubmitBtn() {
            if (selectedCafe && selectedTime) {
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function celebrate() {
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + '%';
                    c.style.top = '-20px';
                    c.innerHTML = ['❤️', '✨', '🌹', '💕', '⭐'][Math.floor(Math.random() * 5)];
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 3000);
                }, i * 25);
            }
        }

        function sendWhatsApp() {
            if (!selectedCafe || !selectedTime) return;
            
            celebrate();
            const phone = '9994997789000';
            const msg = `I choose: ${selectedCafe} at ${selectedTime} 💕✨`;
            
            setTimeout(() => {
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            }, 300);
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart particle';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + '%';
            h.style.animationDuration = (6 + Math.random() * 2) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 8000);
        }

        function createFlower() {
            const flowers = ['🌹', '🌸', '🌺', '🌼', '🌻'];
            const f = document.createElement('div');
            f.className = 'flower particle';
            f.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
            f.style.left = Math.random() * 100 + '%';
            f.style.animationDuration = (7 + Math.random() * 2) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 9000);
        }

        createCafeButtons();
        createTimeButtons();
        setInterval(createHeart, 1500);
        setInterval(createFlower, 2000);
    </script>
</body>
</html>
