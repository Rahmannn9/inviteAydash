<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sənə Dəvət 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #764ba2;
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: #764ba2;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .cafe-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .cafe-btn {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: center;
        }

        .cafe-btn:hover {
            border-color: #764ba2;
            background: #f5f5f5;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
        }

        .cafe-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #764ba2;
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.4);
        }

        .time-container {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .time-input {
            width: 60px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }

        .time-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.3);
        }

        .colon {
            font-size: 2rem;
            color: #764ba2;
            font-weight: bold;
        }

        .period-selector {
            display: flex;
            gap: 8px;
        }

        .period-btn {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            flex: 1;
        }

        .period-btn.active {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(118, 75, 162, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 1rem;
        }

        .spinner-container {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .spinner {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .spinner button {
            width: 30px;
            height: 25px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            color: #764ba2;
            transition: all 0.2s;
        }

        .spinner button:hover {
            background: #f0f0f0;
            border-color: #764ba2;
        }

        .spinner input {
            width: 50px;
            text-align: center;
            font-weight: bold;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 8px;
        }

        .emoji {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕 Sənə Dəvət</h1>
        <p class="subtitle">Bir neçə şey seç...</p>

        <form id="dateForm">
            <!-- Café Selection -->
            <div class="form-group">
                <label class="form-label">☕ Kafeyi Seç:</label>
                <div class="cafe-options">
                    <button type="button" class="cafe-btn" onclick="selectCafe(this, 'Kafe Aroma')">
                        <span class="emoji">☕</span><br>Aroma
                    </button>
                    <button type="button" class="cafe-btn" onclick="selectCafe(this, 'Kafe Bliss')">
                        <span class="emoji">🌸</span><br>Bliss
                    </button>
                    <button type="button" class="cafe-btn" onclick="selectCafe(this, 'Kafe Nur')">
                        <span class="emoji">🌹</span><br>Nur
                    </button>
                    <button type="button" class="cafe-btn" onclick="selectCafe(this, 'Kafe Harmoniya')">
                        <span class="emoji">🦋</span><br>Harmoniya
                    </button>
                </div>
            </div>

            <!-- Time Selection -->
            <div class="form-group">
                <label class="form-label">⏰ Saatı Seç:</label>
                <div class="time-container">
                    <div class="spinner">
                        <button type="button" onclick="incHour()">▲</button>
                        <input type="text" id="hour" value="12" readonly class="time-input">
                        <button type="button" onclick="decHour()">▼</button>
                    </div>
                    <span class="colon">:</span>
                    <div class="spinner">
                        <button type="button" onclick="incMin()">▲</button>
                        <input type="text" id="minute" value="00" readonly class="time-input">
                        <button type="button" onclick="decMin()">▼</button>
                    </div>
                    <div class="period-selector">
                        <button type="button" class="period-btn active" onclick="setPeriod(this, 'AM')">AM</button>
                        <button type="button" class="period-btn" onclick="setPeriod(this, 'PM')">PM</button>
                    </div>
                </div>
            </div>

            <button type="button" class="submit-btn" onclick="submitForm()">Göndər 💕</button>
        </form>

        <div class="message" id="message"></div>
    </div>

    <script>
        let selectedCafe = null;
        let selectedHour = 12;
        let selectedMinute = 0;
        let selectedPeriod = 'AM';

        function selectCafe(btn, cafe) {
            document.querySelectorAll('.cafe-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCafe = cafe;
        }

        function incHour() {
            selectedHour = selectedHour === 12 ? 1 : selectedHour + 1;
            document.getElementById('hour').value = String(selectedHour).padStart(2, '0');
        }

        function decHour() {
            selectedHour = selectedHour === 1 ? 12 : selectedHour - 1;
            document.getElementById('hour').value = String(selectedHour).padStart(2, '0');
        }

        function incMin() {
            selectedMinute = (selectedMinute + 15) % 60;
            document.getElementById('minute').value = String(selectedMinute).padStart(2, '0');
        }

        function decMin() {
            selectedMinute = selectedMinute === 0 ? 45 : selectedMinute - 15;
            document.getElementById('minute').value = String(selectedMinute).padStart(2, '0');
        }

        function setPeriod(btn, period) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedPeriod = period;
        }

        function submitForm() {
            if (!selectedCafe) {
                alert('Zəhmət olmasa kafeyi seç!');
                return;
            }

            const time = `${String(selectedHour).padStart(2, '0')}:${String(selectedMinute).padStart(2, '0')} ${selectedPeriod}`;
            const phone = '9994997789000';
            const message = `Salam! Mən ${selectedCafe} kafesinə ${time} vaxtında getmək istəyirəm 💕`;
            
            const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        // Auto-focus effect
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Sayt yükləndi ✓');
        });
    </script>
</body>
</html>
