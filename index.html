<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation ✨</title>
    
    <!-- Animate.css for animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- GSAP for advanced animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Confetti library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe4f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated blur background */
        .blur-blob {
            position: fixed;
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(214,51,832,0.4), transparent);
            left: -200px;
            top: 100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(194,24,91,0.3), transparent);
            right: -150px;
            top: 400px;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(214,51,132,0.35), transparent);
            left: 50%;
            bottom: 100px;
        }

        .container {
            max-width: 100%;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #c2185b;
            font-size: 1.3rem;
            font-style: italic;
            margin-bottom: 30px;
        }

        /* Quiz Section */
        .quiz-section {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            margin: 30px auto;
            max-width: 700px;
            box-shadow: 0 15px 50px rgba(214, 51, 132, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            min-height: 400px;
        }

        .quiz-title {
            font-size: 1.8rem;
            color: #d63384;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .quiz-question {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quiz-btn {
            background: linear-gradient(135deg, rgba(255, 200, 220, 0.8), rgba(255, 180, 210, 0.8));
            backdrop-filter: blur(10px);
            border: 2px solid rgba(214, 51, 132, 0.3);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #333;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .quiz-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #d63384, #c2185b);
            transition: left 0.5s;
            z-index: -1;
        }

        .quiz-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.3);
            color: white;
            border-color: #d63384;
        }

        .quiz-btn:hover:before {
            left: 0;
        }

        .quiz-btn.selected {
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            border-color: #d63384;
            box-shadow: 0 15px 40px rgba(214, 51, 132, 0.5);
            transform: scale(1.08);
        }

        .next-btn {
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            padding: 15px 50px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(214, 51, 132, 0.3);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .next-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 35px rgba(214, 51, 132, 0.6);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Dating Section */
        .dating-section {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            margin: 30px auto;
            max-width: 700px;
            box-shadow: 0 15px 50px rgba(214, 51, 132, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            display: none;
        }

        .dating-section.active {
            display: block;
        }

        .selection-container {
            margin: 25px 0;
        }

        .selection-title {
            font-size: 1.4rem;
            color: #d63384;
            margin-bottom: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 15px;
        }

        .selection-title:hover {
            background: rgba(214, 51, 132, 0.1);
            transform: scale(1.05);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: rgba(240, 240, 240, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(214, 51, 132, 0.2);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            color: #333;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .option-btn:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(214, 51, 132, 0.3));
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .option-btn:hover {
            transform: scale(1.08);
            border-color: #d63384;
            background: rgba(232, 213, 232, 0.9);
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
        }

        .option-btn:hover:before {
            width: 300px;
            height: 300px;
        }

        .option-btn.selected {
            background: linear-gradient(135deg, rgba(214, 51, 132, 0.9), rgba(194, 24, 91, 0.9));
            color: white;
            border-color: #d63384;
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.5);
        }

        /* Time Picker Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe4f0 100%);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 80px rgba(214, 51, 132, 0.3);
            border: 3px solid rgba(214, 51, 132, 0.2);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .modal-title {
            font-size: 1.8rem;
            color: #d63384;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .time-picker {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        .time-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-label {
            font-size: 0.9rem;
            color: #c2185b;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .time-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .spinner-btn {
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.3);
        }

        .spinner-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(214, 51, 132, 0.5);
        }

        .spinner-btn:active {
            transform: scale(0.9);
        }

        .time-display {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(214, 51, 132, 0.3);
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #d63384;
            min-width: 60px;
            text-align: center;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .period-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .period-btn {
            background: rgba(240, 240, 240, 0.7);
            border: 2px solid rgba(214, 51, 132, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            transition: all 0.3s ease;
        }

        .period-btn.active {
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            border-color: #d63384;
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
            flex: 1;
        }

        .confirm-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(214, 51, 132, 0.5);
        }

        .cancel-btn {
            background: rgba(200, 200, 200, 0.6);
            color: #333;
            flex: 1;
        }

        .cancel-btn:hover {
            background: rgba(180, 180, 180, 0.8);
        }

        .submit-btn {
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            padding: 15px 50px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(214, 51, 132, 0.3);
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 12px 35px rgba(214, 51, 132, 0.6);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 40px;
            font-size: 1.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(214, 51, 132, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d63384, #c2185b);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .score-display {
            font-size: 1.2rem;
            color: #d63384;
            font-weight: bold;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .options-grid { grid-template-columns: 1fr; }
            .quiz-options { grid-template-columns: 1fr; }
            .dating-section, .quiz-section { padding: 25px; max-width: 95%; }
            .modal-content { padding: 30px; }
            .time-picker { gap: 10px; }
        }

        /* Particle effects */
        .particle-emoji {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <!-- Animated blur blobs -->
    <div class="blur-blob blob-1"></div>
    <div class="blur-blob blob-2"></div>
    <div class="blur-blob blob-3"></div>

    <div class="container">
        <h1 class="animate__animated animate__fadeInDown">✨ You're Special ✨</h1>
        <p class="subtitle animate__animated animate__fadeInUp">Let's play a fun quiz first! 🎮</p>

        <!-- Quiz Section -->
        <div class="quiz-section animate__animated animate__fadeInUp" id="quizSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="score-display">Question <span id="currentQuestion">1</span> of 3</div>
            <div class="quiz-title">🎯 Quick Quiz</div>
            <div class="quiz-question" id="quizQuestion"></div>
            <div class="quiz-options" id="quizOptions"></div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question →</button>
        </div>

        <!-- Dating Selection Section -->
        <div class="dating-section" id="datingSection">
            <h2 class="quiz-title">☕ Now, let's plan our date!</h2>

            <div class="selection-container">
                <div class="selection-title">☕ Choose a Café</div>
                <div class="options-grid" id="cafeGrid"></div>
            </div>

            <div class="selection-container">
                <div class="selection-title" onclick="openTimeModal()">⏰ Choose a Time</div>
                <div id="selectedTimeDisplay" style="font-size: 1.2rem; color: #d63384; font-weight: bold; margin-top: 10px;"></div>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="sendWhatsApp()" disabled>
                Send My Choice 💕
            </button>
        </div>

        <div class="footer">Can't wait to see you! 💕✨🌹</div>
    </div>

    <!-- Time Picker Modal -->
    <div class="modal-overlay" id="timeModal">
        <div class="modal-content animate__animated animate__zoomIn">
            <div class="modal-title">⏰ Select Time</div>
            
            <div class="time-picker">
                <div class="time-column">
                    <div class="time-label">Hours</div>
                    <div class="time-spinner">
                        <button class="spinner-btn" onclick="incrementHour()">▲</button>
                        <div class="time-display" id="hourDisplay">12</div>
                        <button class="spinner-btn" onclick="decrementHour()">▼</button>
                    </div>
                </div>

                <div style="font-size: 2rem; color: #d63384; font-weight: bold;">:</div>

                <div class="time-column">
                    <div class="time-label">Minutes</div>
                    <div class="time-spinner">
                        <button class="spinner-btn" onclick="incrementMinute()">▲</button>
                        <div class="time-display" id="minuteDisplay">00</div>
                        <button class="spinner-btn" onclick="decrementMinute()">▼</button>
                    </div>
                </div>
            </div>

            <div class="period-toggle">
                <button class="period-btn active" id="amBtn" onclick="setPeriod('AM')">AM</button>
                <button class="period-btn" id="pmBtn" onclick="setPeriod('PM')">PM</button>
            </div>

            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" onclick="closeTimeModal()">Cancel</button>
                <button class="modal-btn confirm-btn" onclick="confirmTime()">Confirm ✓</button>
            </div>
        </div>
    </div>

    <script>
        // Quiz questions
        const quizQuestions = [
            {
                question: "What's your favorite way to spend time?",
                options: ["☕ Relaxing at cafés", "🎭 Having adventures"],
                answers: ["☕ Relaxing at cafés", "🎭 Having adventures"]
            },
            {
                question: "What's the best time to meet?",
                options: ["🌅 Morning vibes", "🌙 Evening magic"],
                answers: ["🌅 Morning vibes", "🌙 Evening magic"]
            },
            {
                question: "What matters most to you?",
                options: ["💕 Deep connection", "😊 Fun & laughter"],
                answers: ["💕 Deep connection", "😊 Fun & laughter"]
            }
        ];

        const cafes = [
            { name: 'Café Aroma', emoji: '☕' },
            { name: 'Café Bliss', emoji: '🌸' },
            { name: 'Café Lumière', emoji: '🌹' },
            { name: 'Café Harmony', emoji: '🦋' }
        ];

        let currentQuestionIndex = 0;
        let quizAnswers = [];
        let selectedCafe = null;
        let selectedTime = null;
        let selectedHour = 12;
        let selectedMinute = 0;
        let selectedPeriod = 'AM';

        // Initialize quiz
        function initQuiz() {
            displayQuestion(0);
            animateBlobs();
        }

        function displayQuestion(index) {
            const question = quizQuestions[index];
            document.getElementById('quizQuestion').textContent = question.question;
            document.getElementById('currentQuestion').textContent = index + 1;
            
            const progressPercent = ((index + 1) / quizQuestions.length) * 100;
            gsap.to('#progressFill', { width: progressPercent + '%', duration: 0.5 });

            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn animate__animated animate__fadeInUp';
                btn.innerHTML = option;
                btn.onclick = () => selectAnswer(idx, btn, option);
                optionsContainer.appendChild(btn);
            });
        }

        function selectAnswer(idx, btn, answer) {
            document.querySelectorAll('.quiz-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            gsap.to(btn, { scale: 1.05, duration: 0.3 });
            
            quizAnswers[currentQuestionIndex] = answer;
            document.getElementById('nextBtn').disabled = false;
            
            createParticles(btn);
        }

        function nextQuestion() {
            currentQuestionIndex++;

            if (currentQuestionIndex < quizQuestions.length) {
                gsap.to('#quizSection', { opacity: 0.5, duration: 0.3, onComplete: () => {
                    displayQuestion(currentQuestionIndex);
                    gsap.to('#quizSection', { opacity: 1, duration: 0.3 });
                }});
                document.getElementById('nextBtn').disabled = true;
            } else {
                completeQuiz();
            }
        }

        function completeQuiz() {
            gsap.to('#quizSection', { 
                opacity: 0, 
                scale: 0.8, 
                duration: 0.6,
                onComplete: () => {
                    document.getElementById('quizSection').style.display = 'none';
                    document.getElementById('datingSection').classList.add('active');
                    gsap.from('#datingSection', { opacity: 0, scale: 0.9, duration: 0.6 });
                    createCafeButtons();
                    confetti();
                }
            });
        }

        function createCafeButtons() {
            const grid = document.getElementById('cafeGrid');
            cafes.forEach((cafe, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate__animated animate__fadeInUp';
                btn.style.animationDelay = (index * 0.1) + 's';
                btn.innerHTML = `${cafe.emoji} ${cafe.name}`;
                btn.onclick = () => selectCafe(index, btn);
                grid.appendChild(btn);
            });
        }

        function selectCafe(index, btn) {
            document.querySelectorAll('#cafeGrid .option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            gsap.to(btn, { scale: 1.1, duration: 0.3 });
            selectedCafe = cafes[index].name;
            enableSubmitBtn();
        }

        // Time Picker Functions
        function openTimeModal() {
            document.getElementById('timeModal').classList.add('active');
            gsap.from('.modal-content', { scale: 0.3, opacity: 0, duration: 0.4 });
        }

        function closeTimeModal() {
            gsap.to('.modal-content', { 
                scale: 0.3, 
                opacity: 0, 
                duration: 0.3,
                onComplete: () => {
                    document.getElementById('timeModal').classList.remove('active');
                }
            });
        }

        function incrementHour() {
            selectedHour = selectedHour === 12 ? 1 : selectedHour + 1;
            updateHourDisplay();
        }

        function decrementHour() {
            selectedHour = selectedHour === 1 ? 12 : selectedHour - 1;
            updateHourDisplay();
        }

        function incrementMinute() {
            selectedMinute = (selectedMinute + 15) % 60;
            updateMinuteDisplay();
        }

        function decrementMinute() {
            selectedMinute = selectedMinute === 0 ? 45 : selectedMinute - 15;
            updateMinuteDisplay();
        }

        function updateHourDisplay() {
            document.getElementById('hourDisplay').textContent = String(selectedHour).padStart(2, '0');
        }

        function updateMinuteDisplay() {
            document.getElementById('minuteDisplay').textContent = String(selectedMinute).padStart(2, '0');
        }

        function setPeriod(period) {
            selectedPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            if (period === 'AM') {
                document.getElementById('amBtn').classList.add('active');
            } else {
                document.getElementById('pmBtn').classList.add('active');
            }
        }

        function confirmTime() {
            selectedTime = `${String(selectedHour).padStart(2, '0')}:${String(selectedMinute).padStart(2, '0')} ${selectedPeriod}`;
            document.getElementById('selectedTimeDisplay').textContent = `⏰ ${selectedTime}`;
            closeTimeModal();
            enableSubmitBtn();
        }

        function enableSubmitBtn() {
            if (selectedCafe && selectedTime) {
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function sendWhatsApp() {
            if (!selectedCafe || !selectedTime) return;
            
            gsap.to('#datingSection', { scale: 0.9, opacity: 0, duration: 0.5 });
            confetti({ particleCount: 100, spread: 70 });
            
            const phone = '9994997789000';
            const msg = `I choose: ${selectedCafe} at ${selectedTime} 💕✨`;
            
            setTimeout(() => {
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            }, 500);
        }

        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-emoji';
                particle.innerHTML = ['❤️', '✨', '🌹', '💕', '⭐'][Math.floor(Math.random() * 5)];
                particle.style.left = rect.left + rect.width / 2 + 'px';
                particle.style.top = rect.top + rect.height / 2 + 'px';
                document.body.appendChild(particle);
                
                gsap.to(particle, {
                    x: (Math.random() - 0.5) * 200,
                    y: -200,
                    opacity: 0,
                    duration: 1,
                    ease: 'power2.out',
                    onComplete: () => particle.remove()
                });
            }
        }

        function animateBlobs() {
            gsap.to('.blob-1', {
                x: 50,
                y: -50,
                duration: 8,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
            gsap.to('.blob-2', {
                x: -50,
                y: 50,
                duration: 10,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
            gsap.to('.blob-3', {
                x: 30,
                y: 30,
                duration: 12,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
        }

        // Close modal when clicking outside
        document.getElementById('timeModal').addEventListener('click', (e) => {
            if (e.target.id === 'timeModal') {
                closeTimeModal();
            }
        });

        // Start
        window.addEventListener('load', initQuiz);
    </script>
</body>
</html>
